{% extends "base.html" %}

{% block content %}
<section class="section">
    <div class="section-title">
        <h2>Contact Us</h2>
        <p>We'd love to hear from you. Send us a message!</p>
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 4rem; max-width: 1000px; margin: 0 auto;">
        <!-- Contact Form -->
        <div style="background: white; padding: 2.5rem; border-radius: 20px; box-shadow: var(--shadow);">
            <form>
                <div style="margin-bottom: 1.5rem;">
                    <label style="display: block; margin-bottom: 0.5rem; font-weight: 600;">Full Name</label>
                    <input type="text" required style="width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; outline: none;">
                </div>
                <div style="margin-bottom: 1.5rem;">
                    <label style="display: block; margin-bottom: 0.5rem; font-weight: 600;">Email Address</label>
                    <input type="email" required style="width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; outline: none;">
                </div>
                <div style="margin-bottom: 1.5rem;">
                    <label style="display: block; margin-bottom: 0.5rem; font-weight: 600;">Message</label>
                    <textarea rows="5" required style="width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; outline: none;"></textarea>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Send Message</button>
            </form>
        </div>

        <!-- Contact Info -->
        <div>
            <div style="margin-bottom: 2rem;">
                <h3 style="margin-bottom: 1rem;"><i class="fas fa-map-marker-alt" style="color: var(--primary-color);"></i> Our Location</h3>
                <p>123 Fresh Lane, Green Valley, AG 56789</p>
            </div>
            <div style="margin-bottom: 2rem;">
                <h3 style="margin-bottom: 1rem;"><i class="fas fa-phone-alt" style="color: var(--primary-color);"></i> Call Us</h3>
                <p>+1 (234) 567-8900</p>
            </div>
            <div style="margin-bottom: 2rem;">
                <h3 style="margin-bottom: 1rem;"><i class="fas fa-envelope" style="color: var(--primary-color);"></i> Email Us</h3>
                <p>info@freshbasket.com</p>
            </div>
            
            <div style="margin-top: 3rem;">
                <h3>Follow Us</h3>
                <div class="social-links" style="margin-top: 1rem;">
                    <a href="#"><i class="fab fa-facebook-f" style="background: var(--primary-color); color: white;"></i></a>
                    <a href="#"><i class="fab fa-instagram" style="background: var(--primary-color); color: white;"></i></a>
                    <a href="#"><i class="fab fa-twitter" style="background: var(--primary-color); color: white;"></i></a>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
